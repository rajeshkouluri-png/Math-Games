<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mental Math Grid Challenge</title>
    <style>
        #game-container {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            max-width: 480px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 6px solid #6c5ce7;
        }
        .controls-row { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 20px; 
            background: #f1f2f6; 
            padding: 15px; 
            border-radius: 12px; 
        }
        .control-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        label { 
            font-size: 0.8em; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: #2d3436; 
        }
        select { 
            padding: 8px; 
            border-radius: 8px; 
            border: 2px solid #6c5ce7; 
            cursor: pointer; 
            font-weight: bold; 
        }
        
        .stats-bar { 
            display: flex; 
            justify-content: space-around; 
            margin-bottom: 15px; 
        }
        .stat-item { 
            background: #a29bfe; 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-weight: bold; 
            color: white; 
            min-width: 90px; 
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .number-btn {
            aspect-ratio: 1 / 1;
            font-size: 1.4em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #00cec9;
            color: white;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #00b894;
        }
        .number-btn.selected { 
            background: #fdcb6e; 
            box-shadow: 0 5px 0 #e1b12c; 
            transform: translateY(2px); 
        }
        .number-btn.hidden { 
            visibility: hidden; 
            opacity: 0; 
            pointer-events: none; 
        }
        
        #msg-overlay { 
            font-size: 1.5em; 
            font-weight: bold; 
            height: 40px; 
            color: #6c5ce7; 
        }

        .star {
            position: fixed;
            z-index: 1000;
            color: #f1c40f;
            font-size: 30px;
            pointer-events: none;
            animation: burst 0.8s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="controls-row">
        <div class="control-group">
            <label>MODE</label>
            <select id="mode-select" onchange="resetEntireGame()">
                <option value="add">Addition (+)</option>
                <option value="sub">Subtraction (-)</option>
            </select>
        </div>
        <div class="control-group">
            <label>TARGET</label>
            <select id="target-select" onchange="resetEntireGame()"></select>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">LEVEL: <span id="level-val">1</span>/5</div>
        <div class="stat-item">⏱ <span id="timer-val">0</span>s</div>
    </div>
    
    <div class="grid" id="grid"></div>
    <div id="msg-overlay"></div>
</div>

<script>
    let currentLvl = 1;
    let selected = [];
    let timerInterval;
    let levelSeconds = 0;
    let totalSeconds = 0;

    // Populate Target Dropdown (10-20)
    const targetSelect = document.getElementById('target-select');
    for(let i=10; i<=20; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i;
        targetSelect.appendChild(opt);
    }

    function startLevelTimer() {
        clearInterval(timerInterval);
        levelSeconds = 0;
        document.getElementById('timer-val').textContent = levelSeconds;
        timerInterval = setInterval(() => {
            levelSeconds++;
            totalSeconds++;
            document.getElementById('timer-val').textContent = levelSeconds;
        }, 1000);
    }

    function resetEntireGame() {
        currentLvl = 1;
        totalSeconds = 0;
        loadLevel();
    }

    function loadLevel() {
        const mode = document.getElementById('mode-select').value;
        const target = parseInt(targetSelect.value);
        document.getElementById('level-val').textContent = currentLvl;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        document.getElementById('msg-overlay').textContent = '';

        let nums = [];
        for(let i=0; i<8; i++) {
            if(mode === 'add') {
                let n1 = Math.floor(Math.random() * (target - 1)) + 1;
                nums.push(n1, target - n1);
            } else {
                let n1 = Math.floor(Math.random() * 20) + 1;
                nums.push(n1, n1 + target);
            }
        }

        nums.sort(() => Math.random() - 0.5);
        nums.forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'number-btn';
            btn.textContent = n;
            btn.onclick = () => handleClick(btn, n);
            grid.appendChild(btn);
        });
        startLevelTimer();
    }

    function handleClick(btn, val) {
        if (selected.length < 2 && !btn.classList.contains('selected')) {
            btn.classList.add('selected');
            selected.push({btn, val});

            if (selected.length === 2) {
                const mode = document.getElementById('mode-select').value;
                const target = parseInt(targetSelect.value);
                const isCorrect = (mode === 'add') 
                    ? (selected[0].val + selected[1].val === target)
                    : (Math.abs(selected[0].val - selected[1].val) === target);

                if (isCorrect) {
                    selected.forEach(item => {
                        spawnStars(item.btn);
                        item.btn.classList.add('hidden');
                    });
                    selected = [];
                    checkWin();
                } else {
                    setTimeout(() => {
                        selected.forEach(item => item.btn.classList.remove('selected'));
                        selected = [];
                    }, 400);
                }
            }
        }
    }

    function spawnStars(btn) {
        const rect = btn.getBoundingClientRect();
        for(let i=0; i<8; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = (rect.left + rect.width/2) + 'px';
            star.style.top = (rect.top + rect.height/2) + 'px';
            star.style.setProperty('--x', (Math.random() * 200 - 100) + 'px');
            star.style.setProperty('--y', (Math.random() * 200 - 100) + 'px');
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 800);
        }
    }

    function checkWin() {
        if (document.querySelectorAll('.number-btn:not(.hidden)').length === 0) {
            clearInterval(timerInterval);
            if (currentLvl < 5) {
                document.getElementById('msg-overlay').textContent = `LVL ${currentLvl} CLEAR! Time: ${levelSeconds}s`;
                setTimeout(() => { 
                    currentLvl++; 
                    loadLevel(); 
                }, 1800);
            } else {
                document.getElementById('grid').innerHTML = `
                    <div style="grid-column: span 4; padding: 20px;">
                        <h2>🏆 CHAMPION!</h2>
                        <p>Total time across all levels: <strong>${totalSeconds}s</strong></p>
                        <button onclick="resetEntireGame()" style="padding: 10px 20px; cursor:pointer; background:#6c5ce7; color:white; border:none; border-radius:10px;">Play Again</button>
                    </div>`;
                document.getElementById('msg-overlay').textContent = "WELL DONE!";
            }
        }
    }

    resetEntireGame();
</script>
</body>
</html>
